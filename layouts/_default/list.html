{{ define "main" }}
<section class="hero" style="padding-bottom:0;">
  <h1 class="fade-in">{{ .Title }}</h1>
  <div class="hero-divider fade-in"></div>
  <p class="fade-in">{{ .Params.description | default "A collection of thoughts, stories, and perspectives." }}</p>
</section>

<section class="post-list" style="margin-top:0;">
  <div class="post-list-inner">
    {{ range .Pages }}
    <article class="post-item fade-in">
      <span class="label-sm">{{ .Date.Format "Jan 02, 2006" }}</span>
      <h2>{{ .Title }}</h2>
      <p>{{ .Summary | plainify | truncate 200 }}</p>
      <a class="read-link" href="{{ .RelPermalink }}">Read Perspective</a>
    </article>
    {{ end }}
  </div>
</section>
{{ end }}
