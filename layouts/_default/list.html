{{ define "main" }}
<div class="container">
  <div class="page-header">
    <h1 class="page-title">{{ .Title }}</h1>
  </div>
  <div class="post-grid">
    {{ range .Pages }}
    <article class="post-card">
      <div class="post-card-accent"></div>
      <div class="post-meta">
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006 年 01 月 02 日" }}</time>
      </div>
      <h2><a class="post-link" href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
      <p class="post-excerpt">{{ .Summary | plainify | truncate 150 }}</p>
      <a class="read-more" href="{{ .RelPermalink }}">阅读更多 →</a>
    </article>
    {{ end }}
  </div>
</div>
{{ end }}
