{{ define "main" }}
<div class="container">
  <article class="post">
    <header class="post-header">
      <h1 class="post-title">{{ .Title }}</h1>
      <div class="post-meta-bar">
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006 年 01 月 02 日" }}</time>
        {{ with .Params.tags }}
        {{ range . }}
        <span class="cat-badge">{{ . }}</span>
        {{ end }}
        {{ end }}
      </div>
    </header>
    <div class="post-content">
      {{ .Content }}
    </div>
  </article>
</div>
{{ end }}
